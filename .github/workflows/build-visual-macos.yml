name: build-visual-macos
on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies (Homebrew)
        run: |
          brew update
          brew install \
            cmake ninja pkg-config \
            qt@6 mlt ffmpeg fftw frei0r sdl2 \
            rubberband vid.stab zimg

      - name: Configure CMake
        run: |
          QT_PREFIX="$(brew --prefix qt@6)"
          MLT_PREFIX="$(brew --prefix mlt)"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX;$MLT_PREFIX" \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/dist"

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Bundle Qt frameworks + create DMG
        run: |
          QT_PREFIX="$(brew --prefix qt@6)"
          APP="dist/Visual.app"
          "$QT_PREFIX/bin/macdeployqt" "$APP" -qmldir=src/qml -dmg
          ls -lh dist/

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: Visual-macos-app
          path: dist/Visual.app
          if-no-files-found: error

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: Visual-macos-dmg
          path: dist/*.dmg
          if-no-files-found: warn
