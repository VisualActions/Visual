name: build-visual-windows

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-charts
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-mlt
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-rubberband
            mingw-w64-x86_64-vid.stab
            mingw-w64-x86_64-libxml2

      - name: Set version
        shell: msys2 {0}
        run: echo "VERSION=$(date +"%y.%-m.%-d")" >> "$GITHUB_ENV"

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DCLANG_FORMAT=OFF \
            -DCMAKE_PREFIX_PATH=/mingw64

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Find exe
        shell: msys2 {0}
        run: find build -name "Visual.exe" 2>/dev/null || find build -name "*.exe" 2>/dev/null

      - name: Bundle dependencies
        shell: msys2 {0}
        run: |
          mkdir -p Visual

          EXE=$(find build -name "Visual.exe" | head -1)
          echo "Found exe at: $EXE"
          cp "$EXE" Visual/

          # Run windeployqt6 to collect Qt DLLs, plugins, and QML modules
          cd Visual
          /mingw64/bin/windeployqt6 \
            --qmldir ../src/qml \
            --no-translations \
            Visual.exe || true
          cd ..

          # Copy MLT runtime: libraries, plugins, and data
          cp /mingw64/bin/libmlt-7.dll       Visual/ 2>/dev/null || true
          cp /mingw64/bin/libmlt++-7.dll     Visual/ 2>/dev/null || true
          mkdir -p Visual/lib/mlt
          cp -r /mingw64/lib/mlt/*           Visual/lib/mlt/ 2>/dev/null || true
          mkdir -p Visual/share/mlt
          cp -r /mingw64/share/mlt/*         Visual/share/mlt/ 2>/dev/null || true

          # Copy FFTW
          cp /mingw64/bin/libfftw3-3.dll     Visual/ 2>/dev/null || true
          cp /mingw64/bin/libfftw3f-3.dll    Visual/ 2>/dev/null || true

          # Copy FFmpeg DLLs
          for dll in avcodec avdevice avfilter avformat avutil postproc swresample swscale; do
            find /mingw64/bin -name "${dll}*.dll" -exec cp {} Visual/ \; 2>/dev/null || true
          done

          # Copy SDL2
          cp /mingw64/bin/SDL2.dll           Visual/ 2>/dev/null || true

          # Copy rubberband and vid.stab
          cp /mingw64/bin/librubberband*.dll Visual/ 2>/dev/null || true
          cp /mingw64/bin/libvidstab*.dll    Visual/ 2>/dev/null || true

          # Copy libxml2
          cp /mingw64/bin/libxml2*.dll       Visual/ 2>/dev/null || true

          # Copy CuteLogger
          find /mingw64/bin -name "libCuteLogger*.dll" -exec cp {} Visual/ \; 2>/dev/null || true

          # GCC / MinGW runtime DLLs
          cp /mingw64/bin/libgcc_s_seh-1.dll    Visual/ 2>/dev/null || true
          cp /mingw64/bin/libstdc++-6.dll        Visual/ 2>/dev/null || true
          cp /mingw64/bin/libwinpthread-1.dll    Visual/ 2>/dev/null || true

          # Sweep all remaining transitive DLL dependencies using ldd
          cd Visual
          NEEDED=1
          while [ "$NEEDED" -gt 0 ]; do
            NEEDED=0
            for exe_or_dll in *.exe *.dll; do
              [ -f "$exe_or_dll" ] || continue
              ldd "$exe_or_dll" 2>/dev/null | grep '/mingw64/' | awk '{print $3}' | while read dep; do
                base=$(basename "$dep")
                if [ ! -f "$base" ]; then
                  cp "$dep" . 2>/dev/null && echo "Copied transitive dep: $base" && NEEDED=1 || true
                fi
              done
            done
          done
          cd ..

      - name: Package zip
        shell: msys2 {0}
        run: zip -gr Visual-windows-x64-$VERSION.zip Visual

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visual-windows-x64
          path: Visual-windows-x64-*.zip
          if-no-files-found: error
