name: build-visual-windows

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel git zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-qt6-declarative
            mingw-w64-x86_64-qt6-charts
            mingw-w64-x86_64-qt6-websockets
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-mlt
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-ffmpeg
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-rubberband
            mingw-w64-x86_64-vid.stab
            mingw-w64-x86_64-libxml2

      - name: Set version
        shell: msys2 {0}
        run: echo "VERSION=$(date +"%y.%-m.%-d")" >> "$GITHUB_ENV"

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=./install \
            -DCLANG_FORMAT=OFF

      - name: Build
        shell: msys2 {0}
        run: cmake --build build --parallel

      - name: Install
        shell: msys2 {0}
        run: cmake --install build

      - name: Bundle dependencies
        shell: msys2 {0}
        run: |
          mkdir -p Visual
          cp install/bin/Visual.exe Visual/
          windeployqt6 --qmldir src/qml Visual/Visual.exe
          # Copy MLT and other MinGW DLLs
          for dll in libmlt-7 libmlt++-7 libfftw3-3 libCuteLogger; do
            find /mingw64/bin -name "${dll}.dll" -exec cp {} Visual/ \;
          done
          # Copy MinGW runtime
          cp /mingw64/bin/libgcc_s_seh-1.dll Visual/
          cp /mingw64/bin/libstdc++-6.dll Visual/
          cp /mingw64/bin/libwinpthread-1.dll Visual/

      - name: Package zip
        shell: msys2 {0}
        run: zip -gr Visual-windows-x64-$VERSION.zip Visual

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Visual-windows-x64
          path: Visual-windows-x64-*.zip
          if-no-files-found: error
